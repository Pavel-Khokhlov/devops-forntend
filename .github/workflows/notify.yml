name: Notify

on:
  workflow_call:
    inputs:
      #checks_result:
      #  required: true
      #  type: string
      build_result:
        required: true
        type: string
      deploy_result:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true


jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        run: |
          BUILD="${{ inputs.build_result }}"
          DEPLOY="${{ inputs.deploy_result }}"
    
          if [ "$BUILD" != "success" ]; then
            TEXT="❌ Build Failure%0A${{ github.repository }} @ ${{ github.  ref_name }}%0AGoto: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ Deploy Failure%0A${{ github.repository }} @ ${{ github.  ref_name }}%0AGoto: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            TEXT="✅ Successful Deployment%0A${{ github.repository }} @ ${{github.ref_name }}"
          fi
    
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT"
