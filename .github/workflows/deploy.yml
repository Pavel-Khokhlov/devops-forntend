name: Deploy
 
on:
  push:
    branches: [main]
 
jobs:
  build:
    #needs: [checks]
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.build-push.outputs.image_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Enter to Docker Hub
        run: docker login -u ${{ vars.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}
      - name: Build and Push image
        id: build-push
        env:
          IMAGE_SHA: ${{ vars.DOCKER_USER }}/frontend:sha-${{ github.sha }}
          IMAGE_LATEST: ${{ vars.DOCKER_USER }}/frontend:latest
        run: |
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image_sha=$IMAGE_SHA" >> $GITHUB_OUTPUT
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/practice

            # Set new DOCKER_FRONTEND_IMAGE inside .env 
            sed -i "s|DOCKER_FRONTEND_IMAGE=.*|DOCKER_FRONTEND_IMAGE=${{ needs.build.outputs.image_sha }}|" .env

            # Restart only frontend, without backtend и db
            docker compose up -d --no-deps frontend
  notify:
    needs: [build, deploy]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      #checks_result: ${{ needs.checks.result }}
      build_result: ${{ needs.build.result }}
      deploy_result: ${{ needs.deploy.result }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}